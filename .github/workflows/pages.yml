name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: showeq-web
    steps:
      - uses: actions/checkout@v5
        with:
          path: showeq-web

      - name: checkout proto alongside
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/showeq-proto
          path: showeq-proto

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run gen
      - run: bun run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: showeq-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
