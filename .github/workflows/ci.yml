name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: showeq-web
    steps:
      - uses: actions/checkout@v5
        with:
          path: showeq-web

      - name: checkout proto alongside
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/showeq-proto
          path: showeq-proto

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run gen
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

      - name: playwright deps
        run: bunx playwright install --with-deps chromium

      - name: e2e
        run: bun run test:e2e
        # Playwright specs don't exist yet; CI will short-circuit cleanly.
        if: hashFiles('showeq-web/tests/**/*.spec.ts') != ''
