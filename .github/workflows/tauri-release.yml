name: Tauri Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install

      - name: Regenerate proto bindings
        run: bun run gen

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'showeq-web ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

  portable-windows:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust + Windows target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install LLVM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang lld

      - name: Install cargo-xwin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin

      - name: Install frontend dependencies
        run: bun install

      - name: Regenerate proto bindings
        run: bun run gen

      - name: Cross-compile portable Windows exe
        run: bun tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc --no-bundle

      - name: Stage release asset
        run: |
          cp src-tauri/target/x86_64-pc-windows-msvc/release/showeq-web.exe \
             showeq-web-${{ github.ref_name }}-portable-x86_64.exe

      - name: Upload to prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'showeq-web ${{ github.ref_name }}'
          prerelease: true
          files: showeq-web-${{ github.ref_name }}-portable-x86_64.exe
